// (title_en/ru/zh) — единый источник правды с README.
const I18N = {
  en: {
    title: "Awesome Vibe Coding Tools",
    searchPlaceholder: "Search tools…",
    all: "All",
    verified: "Verified",
    new: "New",
    sortStars: "Stars", sortDate: "Recently added", sortName: "Name",
    results: n => `${n} tool${n === 1 ? "" : "s"}`,
    noResults: "No tools match your filters.",
    footer: 'Data from data/tools.yml · auto-updated daily · <a href="https://github.com/axisrow/vibetools">GitHub</a>',
  },
  ru: {
    title: "Утилиты для вайбкодеров",
    searchPlaceholder: "Поиск инструментов…",
    all: "Все",
    verified: "Проверенные",
    new: "Новые",
    sortStars: "Звёзды", sortDate: "Недавно добавленные", sortName: "Название",
    results: n => `${n} инструмент(ов)`,
    noResults: "Ничего не найдено по фильтрам.",
    footer: 'Данные из data/tools.yml · обновляется ежедневно · <a href="https://github.com/axisrow/vibetools">GitHub</a>',
  },
  zh: {
    title: "Vibe 编程工具集",
    searchPlaceholder: "搜索工具…",
    all: "全部",
    verified: "已验证",
    new: "新",
    sortStars: "星标", sortDate: "最近添加", sortName: "名称",
    results: n => `${n} 个工具`,
    noResults: "没有符合筛选条件的工具。",
    footer: '数据来自 data/tools.yml · 每日自动更新 · <a href="https://github.com/axisrow/vibetools">GitHub</a>',
  },
};

const DATA = window.__DATA__;
const CATS = Object.fromEntries(DATA.categories.map(c => [c.key, c]));
let lang = localStorage.getItem("lang") || "en";
let activeCat = "all";
let sortMode = "stars";
let query = "";

const $ = id => document.getElementById(id);

function t(key) { return I18N[lang][key]; }
function catTitle(key) { return CATS[key]["title_" + lang] || CATS[key].title_en; }

function applyI18n() {
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const k = el.dataset.i18n;
    if (typeof I18N[lang][k] === "string") el.textContent = I18N[lang][k];
  });
  document.querySelectorAll("[data-i18n-ph]").forEach(el => {
    el.placeholder = I18N[lang][el.dataset.i18nPh];
  });
  document.querySelectorAll(".lang button").forEach(b => {
    b.classList.toggle("active", b.dataset.lang === lang);
  });
  // Селект сортировки — обновляем option-тексты под язык.
  Array.from($("sort").options).forEach(o => {
    if (o.dataset.i18n) o.textContent = I18N[lang][o.dataset.i18n];
  });
  renderCats();
  render();
}

function renderCats() {
  const counts = {};
  DATA.tools.forEach(t => counts[t.category] = (counts[t.category] || 0) + 1);
  const cats = $("cats");
  cats.innerHTML = "";
  const mk = (key, label, count) => {
    const b = document.createElement("button");
    b.className = "cat" + (activeCat === key ? " active" : "");
    b.innerHTML = label + ` <span class="count">${count}</span>`;
    b.onclick = () => { activeCat = key; applyI18n(); };
    cats.appendChild(b);
  };
  mk("all", t("all"), DATA.tools.length);
  DATA.categories.forEach(c => mk(c.key, catTitle(c.key), counts[c.key] || 0));
}

function fmtStars(n) {
  if (n == null) return null;
  if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, "") + "k";
  return String(n);
}

function filtered() {
  const q = query.trim().toLowerCase();
  const verified = $("f-verified").checked;
  const isNew = $("f-new").checked;
  let list = DATA.tools.filter(tool => {
    if (activeCat !== "all" && tool.category !== activeCat) return false;
    if (verified && !tool.verified) return false;
    if (isNew && !tool.isNew) return false;
    if (q && !tool.search.includes(q)) return false;  // search — lowercase haystack
    return true;
  });
  list.sort((a, b) => {
    if (sortMode === "stars") return (b.stars || 0) - (a.stars || 0);
    if (sortMode === "name") return a.name.localeCompare(b.name);
    if (sortMode === "date") return (b.added || "").localeCompare(a.added || "");
    return 0;
  });
  return list;
}

function render() {
  const list = filtered();
  $("meta").textContent = t("results")(list.length);
  const ul = $("list");
  if (!list.length) { ul.innerHTML = `<li class="empty">${t("noResults")}</li>`; return; }
  const frag = document.createDocumentFragment();
  list.forEach(tool => {
    const li = document.createElement("li");
    li.className = "item";
    const desc = tool.desc[lang] || tool.desc.en;
    // Звёзды: число если есть, иначе shields-бейдж (fallback до stars.json).
    const starsHtml = tool.stars != null
      ? `<span class="stars">★ ${fmtStars(tool.stars)}</span>`
      : (tool.starsUrl ? `<span class="stars"><img src="${tool.starsUrl}" alt="stars"></span>` : "");
    const tags = [];
    if (tool.verified) tags.push(`<span class="tag verified">${t("verified")}</span>`);
    if (tool.isNew) tags.push(`<span class="tag new">${t("new")}</span>`);
    li.innerHTML = `
      <div class="item-main">
        <div class="item-name"><a href="${tool.url}" target="_blank" rel="noopener">${esc(tool.name)}</a></div>
        <div class="item-desc">${esc(desc)} <span class="tag">${esc(catTitle(tool.category))}</span></div>
      </div>
      <div class="badges">${tags.join("")}${starsHtml}</div>`;
    frag.appendChild(li);
  });
  ul.innerHTML = "";
  ul.appendChild(frag);
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => (
    {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// События.
let debounce;
$("search").addEventListener("input", e => {
  clearTimeout(debounce);
  debounce = setTimeout(() => { query = e.target.value; render(); }, 120);
});
$("sort").addEventListener("change", e => { sortMode = e.target.value; render(); });
$("f-verified").addEventListener("change", render);
$("f-new").addEventListener("change", render);
document.querySelectorAll(".lang button").forEach(b => {
  b.addEventListener("click", () => { lang = b.dataset.lang; localStorage.setItem("lang", lang); applyI18n(); });
});

applyI18n();
</script>
</body>
