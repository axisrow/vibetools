<script>
  (() => {
    const prefersDark = window.matchMedia &&
      window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.setAttribute("data-bs-theme", prefersDark ? "dark" : "light");
  })();
</script>
<script>
  (() => {
    const localCssHref = "vendor/bootstrap/5.3.8/css/bootstrap.min.css";
    window.__loadBootstrapCssFallback = () => {
      const link = document.getElementById("bootstrap-css");
      if (!link || link.dataset.bootstrapFallback === "true") return;
      link.dataset.bootstrapFallback = "true";
      link.removeAttribute("integrity");
      link.removeAttribute("crossorigin");
      link.href = localCssHref;
    };
    window.__markBootstrapCssReady = () => {
      document.documentElement.dataset.bootstrapCss = "ready";
    };
  })();
</script>
<link
  id="bootstrap-css"
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
  rel="stylesheet"
  integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
  crossorigin="anonymous"
  onload="window.__markBootstrapCssReady && window.__markBootstrapCssReady();"
  onerror="window.__loadBootstrapCssFallback && window.__loadBootstrapCssFallback();"
>
<script>
  (() => {
    const hasBootstrapCss = () =>
      getComputedStyle(document.documentElement)
        .getPropertyValue("--bs-body-font-family")
        .trim() !== "";
    window.addEventListener("load", () => {
      requestAnimationFrame(() => {
        if (!hasBootstrapCss()) window.__loadBootstrapCssFallback();
      });
    }, { once: true });
  })();
</script>

// bootstrapApp(DATA) вызывается после fetch('data.json') (см. конец скрипта).
// Вся инициализация (precompute из DATA, listeners, applyI18n) отложена —
// данные больше не инлайнятся, а грузятся асинхронно.
// Имя bootstrapApp (не bootstrap): Bootstrap JS (CDN, defer) при загрузке
// кладёт window.bootstrap своим API (bootstrap.Modal, …). Наша функция
// инициализации на топ-уровне скрипта тоже становилась window.bootstrap, а
// .then(bootstrap) резолвил имя ПОСЛЕ того, как Bootstrap JS успевал его
// перезаписать → "TypeError: bootstrap is not a function" на fetch-resolve.
function bootstrapApp(DATA) {
const CATS = Object.fromEntries(DATA.categories.map(c => [c.key, c]));
// Precompute производных от статичных DATA.tools ОДИН раз при загрузке —
// filtered() ходит по всем тулзам на каждом keystroke/toggle, пересчитывать
// их каждый render — лишняя работа. Образец — CATS выше.
// TREND_KINDS объявлен ПЕРВЫМ: на него ссылается TRENDSHIFT_URLS ниже
// (eager-вычисление), а const в TDZ до своей декларации → ссылка выше
// объявления бросила бы ReferenceError и убила весь скрипт при загрузке.
const TREND_KINDS = ["day", "week", "month", "year"];
function _yearOf(tool) {
  const year = tool.createdAt ? String(tool.createdAt).slice(0, 4) : "";
  return /^\d{4}$/.test(year) ? year : "";
}
const TOOL_YEAR = new Map(DATA.tools.map(tool => [tool.url, _yearOf(tool)]));
const YEARS = Array.from(new Set(TOOL_YEAR.values().filter(Boolean))).sort((a, b) => b.localeCompare(a));
const TRENDSHIFT_URLS = new Set(DATA.tools
  .filter(tool => ((tool.trendshift && tool.trendshift.badges) || []).some(badge => badge && TREND_KINDS.includes(badge.kind)))
  .map(tool => tool.url));
// Featured-блок: один случайный trendshift-репо, выбранный ОДИН раз при загрузке
// страницы. Фиксируется на весь сеанс (не прыгает при смене языка/фильтра, т.к.
// applyI18n→renderFeatured вызывается многократно); меняется только при перезагрузке.
// Пул — тот же критерий, что у фильтра каталога (toolHasTrendshift), единый источник.
const _trendshiftPool = DATA.tools.filter(toolHasTrendshift);
const featuredTool = _trendshiftPool.length
  ? _trendshiftPool[Math.floor(Math.random() * _trendshiftPool.length)]
  : null;
const LANGUAGES = {
  en: { label: "English", short: "EN" },
  ru: { label: "Русский", short: "RU" },
  zh: { label: "中文", short: "中文" },
};
// localStorage общий для всех GitHub Pages одного пользователя; другой проект
// (или старая версия сайта) мог записать невалидное значение («de», «ru-RU»).
// Без валидации I18N[lang] → undefined → TypeError в applyI18n → пустая страница.
// Поэтому сбрасываем всё, что не входит в {en, ru, zh}, на «en».
let lang = localStorage.getItem("lang");
if (!Object.prototype.hasOwnProperty.call(I18N, lang)) lang = "en";
// Мультивыбор категорий. Пустой Set = «все» (фильтр не применяется).
// Не персистится в localStorage (как и было у прежнего одиночного выбора).
let selectedCats = new Set();
let activeLang = "all";
let activeTrendshift = false;
let activeYear = "all";
let sortMode = "stars";
let query = "";

// Пагинация (10/50/100). Размер страницы хранится в localStorage (как lang),
// валидируется по PAGE_SIZES — мусор/NaN/чужое значение → fallback 50.
const PAGE_SIZES = [10, 50, 100];
let pageSize = parseInt(localStorage.getItem("vibetools:pageSize"), 10);
if (!PAGE_SIZES.includes(pageSize)) pageSize = 50;
let currentPage = 1;

const $ = id => document.getElementById(id);

function t(key) { return I18N[lang][key]; }
function catTitle(key) { return CATS[key]["title_" + lang] || CATS[key].title_en; }

function applyI18n() {
  document.documentElement.lang = lang;
  document.title = t("title");
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const k = el.dataset.i18n;
    if (typeof I18N[lang][k] === "string") el.textContent = I18N[lang][k];
  });
  document.querySelectorAll("[data-i18n-html]").forEach(el => {
    const k = el.dataset.i18nHtml;
    if (typeof I18N[lang][k] === "string") el.innerHTML = I18N[lang][k];
  });
  document.querySelectorAll("[data-i18n-ph]").forEach(el => {
    el.placeholder = I18N[lang][el.dataset.i18nPh];
  });
  document.querySelectorAll(".language-option").forEach(option => {
    const active = option.dataset.lang === lang;
    option.classList.toggle("active", active);
    option.setAttribute("aria-current", active ? "true" : "false");
  });
  $("language-current").textContent = LANGUAGES[lang]?.short || lang.toUpperCase();
  Array.from($("sort").options).forEach(o => {
    if (o.dataset.i18n) o.textContent = I18N[lang][o.dataset.i18n];
  });
  $("summary").textContent = t("summary")(DATA.tools.length);
  $("total-tools").textContent = DATA.tools.length;
  $("generated").textContent = t("generated")(DATA.generatedAt);
  $("f-page-size").value = String(pageSize);
  renderCats();
  renderYears();
  renderLanguages();
  renderFeatured();
  render();
}

function renderCats() {
  const counts = {};
  DATA.tools.forEach(tool => counts[tool.category] = (counts[tool.category] || 0) + 1);
  const listEl = $("category-options");
  listEl.innerHTML = "";

  // Пункты — только реальные категории (без «all»): пустой selectedCats = все.
  DATA.categories.forEach(c => {
    const count = counts[c.key] || 0;
    const label = catTitle(c.key);
    const checked = selectedCats.has(c.key);
    const li = document.createElement("li");
    li.className = "category-option" + (checked ? " active" : "");
    li.dataset.key = c.key;
    li.dataset.label = label.toLowerCase();
    li.setAttribute("role", "option");
    li.setAttribute("aria-selected", checked ? "true" : "false");
    li.tabIndex = 0;
    li.innerHTML =
      `<span class="category-check" aria-hidden="true">✓</span>` +
      `<span class="category-option-label">${esc(label)}</span>` +
      `<span class="category-count">${count}</span>`;
    li.addEventListener("click", () => toggleCat(c.key));
    li.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleCat(c.key); }
    });
    listEl.appendChild(li);
  });

  // Счётчик на закрытой кнопке: скрыт когда пусто, «· N» при выборе.
  const badge = $("category-count");
  if (selectedCats.size > 0) {
    badge.textContent = "· " + selectedCats.size;
    badge.hidden = false;
  } else {
    badge.textContent = "";
    badge.hidden = true;
  }

  // Повторно применяем текущий фильтр поиска по пунктам (если поле не пустое).
  filterCategoryOptions($("category-search").value);
}

// Тоггл одной категории. Пустой Set после снятия последней = авто-возврат к «все».
function toggleCat(key) {
  if (selectedCats.has(key)) selectedCats.delete(key);
  else selectedCats.add(key);
  currentPage = 1;
  renderCats();  // перерисовать галочки + счётчик кнопки
  render();      // лёгкий ре-рендер списка (applyI18n не нужен — язык не менялся)
}

// Client-side фильтр пунктов дропдауна по подстроке названия.
function filterCategoryOptions(term) {
  const q = (term || "").trim().toLowerCase();
  $("category-options").querySelectorAll(".category-option").forEach(li => {
    li.hidden = q ? !li.dataset.label.includes(q) : false;
  });
}

function renderLanguages() {
  // <select> фильтра языка программирования: опции из DATA.languages
  // (unique, sorted, null исключён) + пункт «все языки».
  const sel = $("f-language");
  if (!sel) return;
  const opts = [`<option value="all">${esc(t("allLanguages"))}</option>`];
  (DATA.languages || []).forEach(l => {
    opts.push(`<option value="${esc(l)}"${activeLang === l ? " selected" : ""}>${esc(l)}</option>`);
  });
  sel.innerHTML = opts.join("");
  sel.value = activeLang;
}

function toolYear(tool) {
  return TOOL_YEAR.get(tool.url) || "";
}

function collectYears() {
  return YEARS;
}

function renderYears() {
  const sel = $("f-year");
  if (!sel) return;
  if (activeYear !== "all" && !YEARS.includes(activeYear)) activeYear = "all";
  const opts = [`<option value="all">${esc(t("allYears"))}</option>`];
  YEARS.forEach(year => {
    opts.push(`<option value="${esc(year)}"${activeYear === year ? " selected" : ""}>${esc(year)}</option>`);
  });
  sel.innerHTML = opts.join("");
  sel.value = activeYear;
}

function toolHasTrendshift(tool) {
  return TRENDSHIFT_URLS.has(tool.url);
}

function activeFilterSummary() {
  const parts = [];
  if (selectedCats.size > 0) {
    const names = DATA.categories
      .filter(c => selectedCats.has(c.key))
      .map(c => catTitle(c.key));
    parts.push(t("filterCategory")(names.join(", ")));
  }
  if ($("f-new").getAttribute("aria-pressed") === "true") parts.push(t("new"));
  if (activeTrendshift) parts.push(t("trendshiftPrefix"));
  if (activeYear !== "all") parts.push(t("filterYear")(activeYear));
  return parts.join(" · ");
}

function fmtStars(n) {
  if (n == null) return null;
  if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, "") + "k";
  return String(n);
}

function icon(name, className = "vt-icon") {
  return `<svg class="bi bi-${esc(name)} ${esc(className)}" aria-hidden="true"><use href="#bi-${esc(name)}"></use></svg>`;
}

function starHtml(tool, className = "stars") {
  if (tool.stars != null) return `<span class="${className}">${icon("star-fill")} ${fmtStars(tool.stars)}</span>`;
  return tool.starsUrl ? `<span class="${className}"><img src="${tool.starsUrl}" alt="stars"></span>` : "";
}

function trendshiftPeriod(kind) {
  if (kind === "day") return t("trendshiftDay");
  if (kind === "week") return t("trendshiftWeek");
  if (kind === "month") return t("trendshiftMonth");
  if (kind === "year") return t("trendshiftYear");
  return kind;
}

function trendshiftLabel(badge) {
  // ranking-source badges несут честный ранг из aria-label SVG; README-source
  // badges ранга не имеют (image URL без aria-label) — для них показываем #1
  // как допущение источника, а не валидированный ранг. См. update_trendshift.py.
  const rank = Number.isInteger(badge.rank) ? badge.rank : 1;
  return `${t("trendshiftPrefix")} #${rank} ${trendshiftPeriod(badge.kind)}`;
}

function trendshiftIcon(kind) {
  if (kind === "week" || kind === "month") return "calendar-week-fill";
  if (kind === "year") return "award-fill";
  return "trophy-fill";
}

function trendshiftAchievementsHtml(tool) {
  const trendshift = tool.trendshift;
  if (!trendshift || !Array.isArray(trendshift.badges) || !trendshift.badges.length) return "";
  const href = trendshift.pageUrl || tool.url;
  const badges = trendshift.badges
    .filter(badge => badge && TREND_KINDS.includes(badge.kind))
    .map(badge => {
      const label = trendshiftLabel(badge);
      return `<a class="trendshift-achievement trendshift-achievement-${esc(badge.kind)}" href="${esc(href)}" target="_blank" rel="noopener" aria-label="${esc(label)}">${icon(trendshiftIcon(badge.kind))}${esc(label)}</a>`;
    })
    .join("");
  return badges ? `<span class="trendshift-achievements">${badges}</span>` : "";
}

// Классы <li> строки-каталога — единый источник для списка (render) и
// Featured-блока (renderFeatured), чтобы chrome карточки жил в одном месте.
const TOOL_LI_CLASS = "list-group-item tool-item py-4";

function toolListItemHtml(tool) {
  return `<li class="${TOOL_LI_CLASS}">${renderToolCard(tool)}</li>`;
}

function renderFeatured() {
  const root = $("featured");
  const target = $("featured-list");
  if (!featuredTool) {
    root.classList.add("d-none");
    target.innerHTML = "";
    return;
  }
  root.classList.remove("d-none");
  // #featured-list — тот же <ul class="tool-list">, что и #list (задан в шаблоне),
  // заполняем одним <li> через общий toolListItemHtml → вёрстка/бордеры/мобильная
  // раскладка идентичны строкам каталога.
  target.innerHTML = toolListItemHtml(featuredTool);
}

function filtered() {
  const q = query.trim().toLowerCase();
  const onlyNew = $("f-new").getAttribute("aria-pressed") === "true";
  let list = DATA.tools.filter(tool => {
    if (selectedCats.size > 0 && !selectedCats.has(tool.category)) return false;
    if (activeLang !== "all" && tool.language !== activeLang) return false;
    if (onlyNew && !tool.isNew) return false;
    if (activeTrendshift && !toolHasTrendshift(tool)) return false;
    if (activeYear !== "all" && toolYear(tool) !== activeYear) return false;
    if (q && !tool.search.includes(q)) return false;
    return true;
  });
  list.sort((a, b) => {
    if (sortMode === "stars") return (b.stars || 0) - (a.stars || 0);
    if (sortMode === "name") return a.name.localeCompare(b.name);
    if (sortMode === "date") return (b.createdAt || "").localeCompare(a.createdAt || "");
    return 0;
  });
  return list;
}

function metric(label, value, iconName = "", kind = "") {
  if (value == null || value === "") return "";
  return `<span class="metric${kind ? ` metric-${esc(kind)}` : ""}">${iconName ? icon(iconName) : ""}<span class="metric-label">${esc(label)}</span> <span class="metric-value">${esc(value)}</span></span>`;
}

function mobileMetric(label, value, iconName = "", kind = "") {
  if (value == null || value === "") return "";
  return `<span class="mobile-metric${kind ? ` mobile-metric-${esc(kind)}` : ""}">${iconName ? icon(iconName) : ""}${esc(label)} <strong>${esc(value)}</strong></span>`;
}

function renderToolCard(tool) {
  const desc = tool.desc[lang] || tool.desc.en;
  const starsHtml = starHtml(tool);
  const mobileStarsHtml = starHtml(tool, "mobile-star");
  const stateTags = [];
  if (tool.isNew) stateTags.push(`<span class="state-badge state-badge-new">${t("new")}</span>`);
  if (tool.archived) stateTags.push(`<span class="state-badge state-badge-archived">${t("archived")}</span>`);
  const trendshiftHtml = trendshiftAchievementsHtml(tool);
  const topicTags = Array.isArray(tool.topics) ? tool.topics.slice(0, 3) : [];
  const submetaParts = [
    esc(catTitle(tool.category)),
    ...(tool.language ? [esc(tool.language)] : []),
    ...topicTags.map(topic => esc(topic)),
  ];
  const submeta = submetaParts
    .map(part => `<span>${part}</span>`)
    .join('<span class="submeta-separator"> / </span>');
  const metrics = [
    metric(t("rank"), tool.rank != null ? `#${tool.rank}` : "", "award-fill", "rank"),
    metric(t("forks"), tool.forks != null ? fmtStars(tool.forks) : "", "git", "forks"),
    metric(t("growth"), tool.starsPerWeek != null ? `+${tool.starsPerWeek}/w` : ""),
    metric(t("year"), tool.createdAt ? tool.createdAt.slice(0, 4) : ""),
  ].join("");
  const mobileMetrics = [
    mobileStarsHtml,
    mobileMetric(t("rank"), tool.rank != null ? `#${tool.rank}` : "", "award-fill", "rank"),
    mobileMetric(t("forks"), tool.forks != null ? fmtStars(tool.forks) : "", "git", "forks"),
    mobileMetric(t("year"), tool.createdAt ? tool.createdAt.slice(0, 4) : ""),
  ].join("");

  return `
      <div class="tool-record">
        <div class="tool-body min-w-0">
          <div class="tool-heading d-flex align-items-center flex-wrap gap-2 mb-2">
            <a class="tool-name text-decoration-none" href="${tool.url}" target="_blank" rel="noopener">${esc(tool.name)}</a>
            ${stateTags.join("")}
            ${trendshiftHtml}
          </div>
          <p class="tool-desc mb-2">${esc(desc)}</p>
          <div class="tool-submeta mb-0">${submeta}</div>
          <div class="mobile-metrics">${mobileMetrics}</div>
        </div>
        <div class="metric-panel">${starsHtml}<div class="metric-list">${metrics}</div></div>
      </div>`;
}

function render() {
  const list = filtered();
  $("meta").textContent = t("results")(list.length);
  $("active-filter").textContent = activeFilterSummary();
  const ul = $("list");
  if (!list.length) {
    ul.innerHTML = `<li class="list-group-item empty">${t("noResults")}</li>`;
    renderPager(0, 1);
    return;
  }
  // Пагинация: метрика результатов остаётся полной (list.length), а список
  // рендерится только для текущей страницы. currentPage зажимается в [1, totalPages]
  // — после смены фильтра список мог стать короче, и номер страницы стал невалиден.
  const totalPages = Math.max(1, Math.ceil(list.length / pageSize));
  if (currentPage < 1) currentPage = 1;
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * pageSize;
  const pageItems = list.slice(start, start + pageSize);
  const frag = document.createDocumentFragment();
  pageItems.forEach(tool => {
    const li = document.createElement("li");
    li.className = TOOL_LI_CLASS;
    li.innerHTML = renderToolCard(tool);
    frag.appendChild(li);
  });
  ul.innerHTML = "";
  ul.appendChild(frag);
  renderPager(list.length, totalPages);
}

function renderPager(totalItems, totalPages) {
  const pager = $("pager");
  // Меньше одной страницы (или 0 результатов) → пейджер прячем.
  if (!pager) return;
  if (totalItems <= pageSize || totalPages <= 1) {
    pager.classList.add("d-none");
    pager.innerHTML = "";
    return;
  }
  pager.classList.remove("d-none");
  // Окно ±2 от текущей страницы; first/last + ellipsis «…», чтобы для 69 страниц
  // не получался сплошной ряд. Prev/Next — языко-нейтральные символы ‹›.
  const windowRadius = 2;
  const windowStart = Math.max(1, currentPage - windowRadius);
  const windowEnd = Math.min(totalPages, currentPage + windowRadius);
  const items = [];
  items.push(`<li class="page-item${currentPage === 1 ? " disabled" : ""}">
    <a class="page-link" href="#" data-page="${currentPage - 1}" aria-label="Previous" rel="prev">‹</a>
  </li>`);
  if (windowStart > 1) {
    items.push(`<li class="page-item"><a class="page-link" href="#" data-page="1">1</a></li>`);
    if (windowStart > 2) items.push(`<li class="page-item disabled"><span class="page-link">…</span></li>`);
  }
  for (let p = windowStart; p <= windowEnd; p++) {
    items.push(`<li class="page-item${p === currentPage ? " active" : ""}">
      <a class="page-link" href="#" data-page="${p}">${p}</a>
    </li>`);
  }
  if (windowEnd < totalPages) {
    if (windowEnd < totalPages - 1) items.push(`<li class="page-item disabled"><span class="page-link">…</span></li>`);
    items.push(`<li class="page-item"><a class="page-link" href="#" data-page="${totalPages}">${totalPages}</a></li>`);
  }
  items.push(`<li class="page-item${currentPage === totalPages ? " disabled" : ""}">
    <a class="page-link" href="#" data-page="${currentPage + 1}" aria-label="Next" rel="next">›</a>
  </li>`);
  pager.innerHTML = `<span class="pager-info">${esc(t("page")(currentPage, totalPages))}</span><ul class="pagination">${items.join("")}</ul>`;
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => (
    {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

let debounce;
$("search").addEventListener("input", e => {
  clearTimeout(debounce);
  debounce = setTimeout(() => { query = e.target.value; currentPage = 1; render(); }, 120);
});
$("sort").addEventListener("change", e => { sortMode = e.target.value; currentPage = 1; render(); });
$("f-language").addEventListener("change", e => { activeLang = e.target.value; currentPage = 1; render(); });
$("f-year").addEventListener("change", e => { activeYear = e.target.value; currentPage = 1; render(); });
$("f-page-size").addEventListener("change", e => {
  const next = parseInt(e.target.value, 10);
  pageSize = PAGE_SIZES.includes(next) ? next : 50;
  localStorage.setItem("vibetools:pageSize", String(pageSize));
  currentPage = 1;
  render();
});
// Делегирование кликов по пейджеру: data-page задаёт целевую страницу.
// disabled-пункты (Prev на 1-й, Next на последней) не имеют рабочей data-page.
$("pager").addEventListener("click", e => {
  e.preventDefault();
  const link = e.target.closest("[data-page]");
  if (!link) return;
  const target = parseInt(link.dataset.page, 10);
  if (!Number.isFinite(target) || target < 1) return;
  currentPage = target;
  render();
  const list = $("list");
  if (list) list.scrollIntoView({ behavior: "smooth", block: "start" });
});
$("f-new").addEventListener("click", e => {
  const pressed = e.currentTarget.getAttribute("aria-pressed") === "true";
  e.currentTarget.setAttribute("aria-pressed", pressed ? "false" : "true");
  currentPage = 1;
  render();
});
$("f-trendshift").addEventListener("click", e => {
  const pressed = e.currentTarget.getAttribute("aria-pressed") === "true";
  activeTrendshift = !pressed;
  e.currentTarget.setAttribute("aria-pressed", activeTrendshift ? "true" : "false");
  currentPage = 1;
  render();
});
$("category-search").addEventListener("input", e => filterCategoryOptions(e.target.value));
$("category-menu").addEventListener("shown.bs.dropdown", () => {
  const s = $("category-search");
  s.value = "";
  filterCategoryOptions("");
  s.focus();
});
document.querySelectorAll(".language-option").forEach(option => {
  option.addEventListener("click", () => {
    lang = option.dataset.lang;
    localStorage.setItem("lang", lang);
    applyI18n();
  });
});

applyI18n();
} // конец bootstrapApp(DATA)

// Грузим данные отдельным файлом (раньше — inline window.__DATA__). relative
// 'data.json' = тот же origin на GitHub Pages, без CORS. До успешного fetch
// страница пустая; при ошибке — понятное сообщение вместо немого зависания.
fetch(DATA_JSON)
  .then(r => {
    if (!r.ok) throw new Error("data.json HTTP " + r.status);
    return r.json();
  })
  .then(data => {
    window.__DATA__ = data;
    bootstrapApp(data);
  })
  .catch(err => {
    const list = document.getElementById("list");
    const note = "Failed to load data.json: " + err + ". " +
      "If viewing locally, run: python -m http.server -d docs (file:// blocks fetch).";
    if (list) {
      list.innerHTML = '<li class="list-group-item empty">' +
        String(note).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])) +
        "</li>";
    }
    console.error(note);
  });
</script>
<script
  id="bootstrap-js"
  defer
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
  crossorigin="anonymous"
  onload="document.documentElement.dataset.bootstrapJs='ready';"
  onerror="this.onerror=null;this.dataset.bootstrapCdnFailed='true';var s=document.createElement('script');s.src='vendor/bootstrap/5.3.8/js/bootstrap.bundle.min.js';s.dataset.bootstrapFallback='true';s.onload=function(){document.documentElement.dataset.bootstrapJs=window.bootstrap?'ready':'missing';};s.onerror=s.onload;document.body.appendChild(s);"
></script>
<script>
  (() => {
    const localBootstrapSrc = "vendor/bootstrap/5.3.8/js/bootstrap.bundle.min.js";
    const markBootstrapState = () => {
      document.documentElement.dataset.bootstrapJs = window.bootstrap ? "ready" : "missing";
    };
    const loadLocalBootstrap = () => {
      if (window.bootstrap || document.querySelector('script[data-bootstrap-fallback="true"]')) return;
      const fallback = document.createElement("script");
      fallback.src = localBootstrapSrc;
      fallback.dataset.bootstrapFallback = "true";
      fallback.onload = markBootstrapState;
      fallback.onerror = markBootstrapState;
      document.body.appendChild(fallback);
    };
    if (window.bootstrap) {
      markBootstrapState();
    } else {
      setTimeout(() => {
        if (!window.bootstrap) loadLocalBootstrap();
      }, 1200);
      window.addEventListener("load", () => setTimeout(markBootstrapState, 0), { once: true });
    }
  })();
</script>
