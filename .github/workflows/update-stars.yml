name: Update Stars

# Раз в сутки обновляет число звёзд для каждой утилиты в data/tools.yml
# через GitHub API, перегенерирует README.md / README.ru.md и коммитит изменения.
# Работает и по ручному запуску (workflow_dispatch).

on:
  schedule:
    # ~03:17 UTC ежедневно (смещение от :00, чтобы не нагружать API в пиковое время)
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Fetch stars and regenerate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_stars.py

      # Trendshift-достижения + per-language harvest (stage 2): обходим 4 глобальных
      # окна + 16 языков × 4 окна, собираем ВСЕ ranking-репо в data/trendshift-repos.json.
      # Отдельный источник, не зависящий от GitHub API. network-tolerant: таймауты,
      # graceful None, а при outage trendshift.io прежние репо сохраняются в обоих
      # кэшах (seed из прежнего файла) — джоб не теряет собранное и не валится.
      # data/trendshift-repos.json отслеживается с seed `[]`, поэтому git add всегда
      # находит pathspec.
      - name: Refresh Trendshift achievements
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_trendshift.py

      # Авто-категоризация обнаруженных trendshift-репо (stage 3): GitHub topics/
      # description → одна из 20 категорий; uncertain → 'needs-review'. Инкрементально
      # (max_per_run=50 за прогон — уважаем rate-limit), категория кэшируется в
      # data/trendshift-repos.json. Звёзды/meta для trendshift-репо уже собраны
      # шагом update_stars выше. Отдельный скрипт: сбой категоризации не блокирует
      # harvest/badges.
      - name: Categorize trendshift repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/categorize_repos.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/stars.json data/stars-history.json data/repos-meta.json data/trendshift.json data/trendshift-repos.json README.md README.ru.md docs/index.html
          if git diff --cached --quiet; then
            echo "No star changes today."
          else
            git commit -m "chore: refresh star counts [skip ci]"
            git push
          fi
