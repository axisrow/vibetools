<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awesome Vibe Coding Tools</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1f2328; --muted: #656d76; --border: #d0d7de;
    --accent: #0969da; --chip: #ddf4ff; --chip-active: #0969da;
    --card: #f6f8fa; --new: #1a7f37;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117; --fg: #e6edf3; --muted: #8b949e; --border: #30363d;
      --accent: #58a6ff; --chip: #1f6feb22; --chip-active: #58a6ff;
      --card: #161b22; --new: #3fb950;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 15px/1.5 -apple-system, "Segoe UI", "PingFang SC",
      "Microsoft YaHei", Roboto, sans-serif;
    background: var(--bg); color: var(--fg);
  }
  header {
    position: sticky; top: 0; z-index: 10; background: var(--bg);
    border-bottom: 1px solid var(--border); padding: 12px 16px;
  }
  .top-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  h1 { font-size: 18px; margin: 0 16px 0 0; white-space: nowrap; }
  .spacer { flex: 1; }
  input[type="search"], select {
    padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--card); color: var(--fg); font-size: 14px;
  }
  input[type="search"] { min-width: 220px; flex: 1; max-width: 460px; }
  .lang button {
    border: 1px solid var(--border); background: var(--card); color: var(--fg);
    border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 13px;
  }
  .lang button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  nav { display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 16px 0; }
  .cat {
    border: 1px solid var(--border); background: var(--card); color: var(--fg);
    border-radius: 999px; padding: 4px 12px; cursor: pointer; font-size: 13px;
  }
  .cat.active { background: var(--chip-active); color: #fff; border-color: var(--chip-active); }
  .cat .count { opacity: .6; margin-left: 4px; }
  .filters { padding: 8px 16px; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .filters label { font-size: 13px; cursor: pointer; color: var(--muted); }
  .filters input[type="checkbox"] { margin-right: 4px; }
  main { padding: 8px 16px 60px; }
  .meta { color: var(--muted); font-size: 13px; padding: 4px 0 10px; }
  ul#list { list-style: none; padding: 0; margin: 0; }
  .item {
    display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .item-main { flex: 1; min-width: 0; }
  .item-name { font-weight: 600; }
  .item-name a { color: var(--accent); text-decoration: none; }
  .item-desc { color: var(--muted); font-size: 14px; margin-top: 2px; }
  .metrics { margin-top: 4px; display: flex; gap: 10px; flex-wrap: wrap; }
  .metric { font-size: 11px; color: var(--muted); }
  .badges { white-space: nowrap; display: flex; gap: 6px; align-items: center; flex-direction: column; align-items: flex-end; }
  .tag { font-size: 11px; padding: 1px 6px; border-radius: 4px; border: 1px solid var(--border); color: var(--muted); }
  .tag.new { color: var(--new); border-color: var(--new); }
  .stars { font-size: 13px; color: var(--muted); }
  .stars img { vertical-align: middle; }
  .empty { color: var(--muted); padding: 40px 0; text-align: center; }
  footer { color: var(--muted); font-size: 12px; padding: 20px 16px; border-top: 1px solid var(--border); }
  footer a { color: var(--accent); }
</style>
</head>
<body>
<header>
  <div class="top-row">
    <h1 data-i18n="title">Awesome Vibe Coding Tools</h1>
    <input type="search" id="search" data-i18n-ph="searchPlaceholder" placeholder="Search…">
    <div class="spacer"></div>
    <select id="sort">
      <option value="stars" data-i18n="sortStars">Stars</option>
      <option value="date" data-i18n="sortDate">Recently added</option>
      <option value="name" data-i18n="sortName">Name</option>
    </select>
    <div class="lang">
      <button data-lang="en">EN</button>
      <button data-lang="ru">RU</button>
      <button data-lang="zh">中文</button>
    </div>
  </div>
  <nav id="cats"></nav>
  <div class="filters">
    <label><input type="checkbox" id="f-new"> <span data-i18n="new">New</span></label>
  </div>
</header>
<main>
  <div class="meta" id="meta"></div>
  <ul id="list"></ul>
</main>
<footer data-i18n="footer"></footer>

<script>
// Встроенные данные (подставляются generate_site.py). Unicode/CJK — как есть.
window.__DATA__ = /*__DATA__*/{};

// UI-строки на 3 языках. Названия категорий берутся из __DATA__.categories
// (title_en/ru/zh) — единый источник правды с README.
const I18N = {
  en: {
    title: "Awesome Vibe Coding Tools",
    searchPlaceholder: "Search tools…",
    all: "All",
    new: "New",
    archived: "archived",
    forks: "forks",
    growth: "growth",
    sortStars: "Stars", sortDate: "Recently added", sortName: "Name",
    results: n => `${n} tool${n === 1 ? "" : "s"}`,
    noResults: "No tools match your filters.",
    footer: 'Data from data/tools.yml · auto-updated daily · Built with GLM-5.2 · <a href="https://github.com/axisrow/vibetools">GitHub</a>',
  },
  ru: {
    title: "Утилиты для вайбкодеров",
    searchPlaceholder: "Поиск инструментов…",
    all: "Все",
    new: "Новые",
    archived: "архив",
    forks: "форки",
    growth: "рост",
    sortStars: "Звёзды", sortDate: "Недавно добавленные", sortName: "Название",
    results: n => `${n} инструмент(ов)`,
    noResults: "Ничего не найдено по фильтрам.",
    footer: 'Данные из data/tools.yml · обновляется ежедневно · Создано на GLM-5.2 · <a href="https://github.com/axisrow/vibetools">GitHub</a>',
  },
  zh: {
    title: "Vibe 编程工具集",
    searchPlaceholder: "搜索工具…",
    all: "全部",
    new: "新",
    archived: "已归档",
    forks: "分叉",
    growth: "增长",
    sortStars: "星标", sortDate: "最近添加", sortName: "名称",
    results: n => `${n} 个工具`,
    noResults: "没有符合筛选条件的工具。",
    footer: '数据来自 data/tools.yml · 每日自动更新 · 使用 GLM-5.2 构建 · <a href="https://github.com/axisrow/vibetools">GitHub</a>',
  },
};

const DATA = window.__DATA__;
const CATS = Object.fromEntries(DATA.categories.map(c => [c.key, c]));
let lang = localStorage.getItem("lang") || "en";
let activeCat = "all";
let sortMode = "stars";
let query = "";

const $ = id => document.getElementById(id);

function t(key) { return I18N[lang][key]; }
function catTitle(key) { return CATS[key]["title_" + lang] || CATS[key].title_en; }

function applyI18n() {
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const k = el.dataset.i18n;
    if (typeof I18N[lang][k] === "string") el.textContent = I18N[lang][k];
  });
  document.querySelectorAll("[data-i18n-ph]").forEach(el => {
    el.placeholder = I18N[lang][el.dataset.i18nPh];
  });
  document.querySelectorAll(".lang button").forEach(b => {
    b.classList.toggle("active", b.dataset.lang === lang);
  });
  // Селект сортировки — обновляем option-тексты под язык.
  Array.from($("sort").options).forEach(o => {
    if (o.dataset.i18n) o.textContent = I18N[lang][o.dataset.i18n];
  });
  renderCats();
  render();
}

function renderCats() {
  const counts = {};
  DATA.tools.forEach(t => counts[t.category] = (counts[t.category] || 0) + 1);
  const cats = $("cats");
  cats.innerHTML = "";
  const mk = (key, label, count) => {
    const b = document.createElement("button");
    b.className = "cat" + (activeCat === key ? " active" : "");
    b.innerHTML = label + ` <span class="count">${count}</span>`;
    b.onclick = () => { activeCat = key; applyI18n(); };
    cats.appendChild(b);
  };
  mk("all", t("all"), DATA.tools.length);
  DATA.categories.forEach(c => mk(c.key, catTitle(c.key), counts[c.key] || 0));
}

function fmtStars(n) {
  if (n == null) return null;
  if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, "") + "k";
  return String(n);
}

function filtered() {
  const q = query.trim().toLowerCase();
  const isNew = $("f-new").checked;
  let list = DATA.tools.filter(tool => {
    if (activeCat !== "all" && tool.category !== activeCat) return false;
    if (isNew && !tool.isNew) return false;
    if (q && !tool.search.includes(q)) return false;  // search — lowercase haystack
    return true;
  });
  list.sort((a, b) => {
    if (sortMode === "stars") return (b.stars || 0) - (a.stars || 0);
    if (sortMode === "name") return a.name.localeCompare(b.name);
    if (sortMode === "date") return (b.added || "").localeCompare(a.added || "");
    return 0;
  });
  return list;
}

function render() {
  const list = filtered();
  $("meta").textContent = t("results")(list.length);
  const ul = $("list");
  if (!list.length) { ul.innerHTML = `<li class="empty">${t("noResults")}</li>`; return; }
  const frag = document.createDocumentFragment();
  list.forEach(tool => {
    const li = document.createElement("li");
    li.className = "item";
    const desc = tool.desc[lang] || tool.desc.en;
    // Звёзды: число если есть, иначе shields-бейдж (fallback до stars.json).
    const starsHtml = tool.stars != null
      ? `<span class="stars">★ ${fmtStars(tool.stars)}</span>`
      : (tool.starsUrl ? `<span class="stars"><img src="${tool.starsUrl}" alt="stars"></span>` : "");
    const tags = [];
    if (tool.isNew) tags.push(`<span class="tag new">${t("new")}</span>`);
    if (tool.archived) tags.push(`<span class="tag">${t("archived")}</span>`);
    // Метрики star-history-стиля: rank, forks, рост за неделю, дата создания.
    const rankHtml = tool.rank != null ? `<span class="metric">#${tool.rank}</span>` : "";
    const forksHtml = tool.forks != null ? `<span class="metric">${t("forks")} ${fmtStars(tool.forks)}</span>` : "";
    const growthHtml = tool.starsPerWeek != null
      ? `<span class="metric">${t("growth")} +${tool.starsPerWeek}/w</span>` : "";
    const createdHtml = tool.createdAt ? `<span class="metric">${tool.createdAt.slice(0,4)}</span>` : "";
    li.innerHTML = `
      <div class="item-main">
        <div class="item-name"><a href="${tool.url}" target="_blank" rel="noopener">${esc(tool.name)}</a></div>
        <div class="item-desc">${esc(desc)} <span class="tag">${esc(catTitle(tool.category))}</span></div>
        <div class="metrics">${rankHtml}${forksHtml}${growthHtml}${createdHtml}</div>
      </div>
      <div class="badges">${tags.join("")}${starsHtml}</div>`;
    frag.appendChild(li);
  });
  ul.innerHTML = "";
  ul.appendChild(frag);
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => (
    {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// События.
let debounce;
$("search").addEventListener("input", e => {
  clearTimeout(debounce);
  debounce = setTimeout(() => { query = e.target.value; render(); }, 120);
});
$("sort").addEventListener("change", e => { sortMode = e.target.value; render(); });
$("f-new").addEventListener("change", render);
document.querySelectorAll(".lang button").forEach(b => {
  b.addEventListener("click", () => { lang = b.dataset.lang; localStorage.setItem("lang", lang); applyI18n(); });
});

applyI18n();
</script>
</body>
</html>
