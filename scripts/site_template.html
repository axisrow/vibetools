<title>Awesome Vibe Coding Tools</title>
<script>
  (() => {
    const prefersDark = window.matchMedia &&
      window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.setAttribute("data-bs-theme", prefersDark ? "dark" : "light");
  })();
</script>
<script>
  (() => {
    const localCssHref = "vendor/bootstrap/5.3.8/css/bootstrap.min.css";
    window.__loadBootstrapCssFallback = () => {
      const link = document.getElementById("bootstrap-css");
      if (!link || link.dataset.bootstrapFallback === "true") return;
      link.dataset.bootstrapFallback = "true";
      link.removeAttribute("integrity");
      link.removeAttribute("crossorigin");
      link.href = localCssHref;
    };
    window.__markBootstrapCssReady = () => {
      document.documentElement.dataset.bootstrapCss = "ready";
    };
  })();
</script>
<link
  id="bootstrap-css"
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
  rel="stylesheet"
  integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
  crossorigin="anonymous"
  onload="window.__markBootstrapCssReady && window.__markBootstrapCssReady();"
  onerror="window.__loadBootstrapCssFallback && window.__loadBootstrapCssFallback();"
>
<script>
  (() => {
    const hasBootstrapCss = () =>
      getComputedStyle(document.documentElement)
        .getPropertyValue("--bs-body-font-family")
        .trim() !== "";
    window.addEventListener("load", () => {
      requestAnimationFrame(() => {
        if (!hasBootstrapCss()) window.__loadBootstrapCssFallback();
      });
    }, { once: true });
  })();
</script>

    featuredTitle: "增长最快",
    featuredNote: "来自每日缓存的近期星标增长最高的仓库。",
    featuredDay: "今日仓库",

    trendshiftMonth: "月榜",
    trendshiftYear: "年榜",
    dayGrowth: "日",
    weekGrowth: "周",
    generated: date => `更新 ${date}`,
    filterCategory: label => `分类：${label}`,
    filterYear: year => `年份：${year}`,
    sortStars: "星标", sortDate: "最新", sortName: "名称",
    results: n => `${n} 个工具`,
    noResults: "没有符合筛选条件的工具。",
    footer: '数据来自 data/tools.yml · 每日自动更新 · 使用 GLM-5.2 构建 · <a href="https://github.com/axisrow/vibetools">GitHub</a>',
  },
};

const DATA = window.__DATA__;
const CATS = Object.fromEntries(DATA.categories.map(c => [c.key, c]));
const TOOLS_BY_URL = new Map(DATA.tools.map(tool => [tool.url, tool]));
const LANGUAGES = {
  en: { label: "English", short: "EN" },
  ru: { label: "Русский", short: "RU" },
  zh: { label: "中文", short: "中文" },
};
const TREND_KINDS = ["day", "week", "month", "year"];
let lang = localStorage.getItem("lang") || "en";
let activeCat = "all";
let activeLang = "all";
let activeTrendshift = false;
let activeYear = "all";
let sortMode = "stars";
let query = "";

const $ = id => document.getElementById(id);

function t(key) { return I18N[lang][key]; }
function catTitle(key) { return CATS[key]["title_" + lang] || CATS[key].title_en; }

function applyI18n() {
  document.documentElement.lang = lang;
  document.title = t("title");
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const k = el.dataset.i18n;
    if (typeof I18N[lang][k] === "string") el.textContent = I18N[lang][k];
  });
  document.querySelectorAll("[data-i18n-html]").forEach(el => {
    const k = el.dataset.i18nHtml;
    if (typeof I18N[lang][k] === "string") el.innerHTML = I18N[lang][k];
  });
  document.querySelectorAll("[data-i18n-ph]").forEach(el => {
    el.placeholder = I18N[lang][el.dataset.i18nPh];
  });
  document.querySelectorAll(".language-option").forEach(option => {
    const active = option.dataset.lang === lang;
    option.classList.toggle("active", active);
    option.setAttribute("aria-current", active ? "true" : "false");
  });
  $("language-current").textContent = LANGUAGES[lang]?.short || lang.toUpperCase();
  Array.from($("sort").options).forEach(o => {
    if (o.dataset.i18n) o.textContent = I18N[lang][o.dataset.i18n];
  });
  $("summary").textContent = t("summary")(DATA.tools.length);
  $("total-tools").textContent = DATA.tools.length;
  $("generated").textContent = t("generated")(DATA.generatedAt);
  renderCats();
  renderYears();
  renderLanguages();
  renderFeatured();
  render();
}

function renderCats() {
  const counts = {};
  DATA.tools.forEach(tool => counts[tool.category] = (counts[tool.category] || 0) + 1);
  const cats = $("cats");
  const categorySelect = $("category-select");
  cats.innerHTML = "";
  categorySelect.innerHTML = "";
  const mk = (key, label, count) => {
    const b = document.createElement("button");
    const active = activeCat === key;
    b.type = "button";
    b.className = "category-tab" + (active ? " active" : "");
    b.setAttribute("aria-pressed", active ? "true" : "false");
    b.innerHTML = `${esc(label)} <span class="category-count">${count}</span>`;
    b.onclick = () => { activeCat = key; applyI18n(); };
    cats.appendChild(b);

    const option = document.createElement("option");
    option.value = key;
    option.textContent = `${label} (${count})`;
    option.selected = active;
    categorySelect.appendChild(option);
  };
  mk("all", t("all"), DATA.tools.length);
  DATA.categories.forEach(c => mk(c.key, catTitle(c.key), counts[c.key] || 0));
}

function renderLanguages() {
  // <select> фильтра языка программирования: опции из DATA.languages
  // (unique, sorted, null исключён) + пункт «все языки».
  const sel = $("f-language");
  if (!sel) return;
  const opts = [`<option value="all">${esc(t("allLanguages"))}</option>`];
  (DATA.languages || []).forEach(l => {
    opts.push(`<option value="${esc(l)}"${activeLang === l ? " selected" : ""}>${esc(l)}</option>`);
  });
  sel.innerHTML = opts.join("");
  sel.value = activeLang;
}

function toolYear(tool) {
  const year = tool.createdAt ? String(tool.createdAt).slice(0, 4) : "";
  return /^\d{4}$/.test(year) ? year : "";
}

function collectYears() {
  return Array.from(new Set(DATA.tools.map(toolYear).filter(Boolean))).sort((a, b) => b.localeCompare(a));
}

function renderYears() {
  const sel = $("f-year");
  if (!sel) return;
  const years = collectYears();
  if (activeYear !== "all" && !years.includes(activeYear)) activeYear = "all";
  const opts = [`<option value="all">${esc(t("allYears"))}</option>`];
  years.forEach(year => {
    opts.push(`<option value="${esc(year)}"${activeYear === year ? " selected" : ""}>${esc(year)}</option>`);
  });
  sel.innerHTML = opts.join("");
  sel.value = activeYear;
}

function toolHasTrendshift(tool) {
  return ((tool.trendshift && tool.trendshift.badges) || []).some(badge => badge && TREND_KINDS.includes(badge.kind));
}

function activeFilterSummary() {
  const parts = [];
  if (activeCat !== "all") parts.push(t("filterCategory")(catTitle(activeCat)));
  if ($("f-new").getAttribute("aria-pressed") === "true") parts.push(t("new"));
  if (activeTrendshift) parts.push(t("trendshiftPrefix"));
  if (activeYear !== "all") parts.push(t("filterYear")(activeYear));
  return parts.join(" · ");
}

function fmtStars(n) {
  if (n == null) return null;
  if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, "") + "k";
  return String(n);
}

function icon(name, className = "vt-icon") {
  return `<svg class="bi bi-${esc(name)} ${esc(className)}" aria-hidden="true"><use href="#bi-${esc(name)}"></use></svg>`;
}

function starHtml(tool, className = "stars") {
  if (tool.stars != null) return `<span class="${className}">${icon("star-fill")} ${fmtStars(tool.stars)}</span>`;
  return tool.starsUrl ? `<span class="${className}"><img src="${tool.starsUrl}" alt="stars"></span>` : "";
}

function featuredLabel(kind) {
  if (kind === "day") return t("featuredDay");
  if (kind === "week") return t("featuredWeek");
  return kind;
}

function featuredIcon(kind) {
  return kind === "week" ? "calendar-week-fill" : "trophy-fill";
}

function featuredAchievementHtml(entry) {
  return `<span class="featured-achievement featured-achievement-${esc(entry.kind)}">${icon(featuredIcon(entry.kind))}${esc(featuredLabel(entry.kind))}</span>`;
}

function trendshiftPeriod(kind) {
  if (kind === "day") return t("trendshiftDay");
  if (kind === "week") return t("trendshiftWeek");
  if (kind === "month") return t("trendshiftMonth");
  if (kind === "year") return t("trendshiftYear");
  return kind;
}

function trendshiftLabel(badge) {
  // ranking-source badges несут честный ранг из aria-label SVG; README-source
  // badges ранга не имеют (image URL без aria-label) — для них показываем #1
  // как допущение источника, а не валидированный ранг. См. update_trendshift.py.
  const rank = Number.isInteger(badge.rank) ? badge.rank : 1;
  return `${t("trendshiftPrefix")} #${rank} ${trendshiftPeriod(badge.kind)}`;
}

function trendshiftIcon(kind) {
  if (kind === "week" || kind === "month") return "calendar-week-fill";
  if (kind === "year") return "award-fill";
  return "trophy-fill";
}

function trendshiftAchievementsHtml(tool) {
  const trendshift = tool.trendshift;
  if (!trendshift || !Array.isArray(trendshift.badges) || !trendshift.badges.length) return "";
  const href = trendshift.pageUrl || tool.url;
  const badges = trendshift.badges
    .filter(badge => badge && ["day", "week", "month", "year"].includes(badge.kind))
    .map(badge => {
      const label = trendshiftLabel(badge);
      return `<a class="trendshift-achievement trendshift-achievement-${esc(badge.kind)}" href="${esc(href)}" target="_blank" rel="noopener" aria-label="${esc(label)}">${icon(trendshiftIcon(badge.kind))}${esc(label)}</a>`;
    })
    .join("");
  return badges ? `<span class="trendshift-achievements">${badges}</span>` : "";
}

function featuredWindow(entry) {
  if (!entry.days) return entry.kind === "week" ? "7d" : "1d";
  return `${entry.days}d`;
}

function featuredDelta(entry) {
  if (entry.delta == null) return "";
  const label = entry.kind === "week" ? t("weekGrowth") : t("dayGrowth");
  return mobileMetric(label, `+${fmtStars(entry.delta)} / ${featuredWindow(entry)}`);
}

function renderFeatured() {
  const root = $("featured");
  const target = $("featured-list");
  const grouped = new Map();
  (DATA.featured || []).forEach(entry => {
    const tool = TOOLS_BY_URL.get(entry.url);
    if (!tool || !entry.kind) return;
    if (!grouped.has(entry.url)) grouped.set(entry.url, { tool, entries: [] });
    grouped.get(entry.url).entries.push(entry);
  });
  const items = Array.from(grouped.values());
  if (!items.length) {
    root.classList.add("d-none");
    target.innerHTML = "";
    return;
  }
  root.classList.remove("d-none");
  target.innerHTML = items.map(item => {
    const tool = item.tool;
    const desc = tool.desc[lang] || tool.desc.en;
    const achievements = item.entries.map(featuredAchievementHtml).join("");
    const metrics = [
      starHtml(tool, "mobile-star"),
      mobileMetric(t("rank"), tool.rank != null ? `#${tool.rank}` : "", "award-fill", "rank"),
      mobileMetric(t("forks"), tool.forks != null ? fmtStars(tool.forks) : "", "git", "forks"),
      ...item.entries.map(featuredDelta),
    ].join("");
    return `
      <div class="featured-item">
        <div class="min-w-0">
          <div class="featured-achievements mb-2">${achievements}</div>
          <a class="featured-tool text-decoration-none" href="${tool.url}" target="_blank" rel="noopener">${esc(tool.name)}</a>
          <div class="featured-desc">${esc(desc)}</div>
        </div>
        <div class="featured-metrics">${metrics}</div>
      </div>`;
  }).join("");
}

function filtered() {
  const q = query.trim().toLowerCase();
  const onlyNew = $("f-new").getAttribute("aria-pressed") === "true";
  let list = DATA.tools.filter(tool => {
    if (activeCat !== "all" && tool.category !== activeCat) return false;
    if (activeLang !== "all" && tool.language !== activeLang) return false;
    if (onlyNew && !tool.isNew) return false;
    if (activeTrendshift && !toolHasTrendshift(tool)) return false;
    if (activeYear !== "all" && toolYear(tool) !== activeYear) return false;
    if (q && !tool.search.includes(q)) return false;
    return true;
  });
  list.sort((a, b) => {
    if (sortMode === "stars") return (b.stars || 0) - (a.stars || 0);
    if (sortMode === "name") return a.name.localeCompare(b.name);
    if (sortMode === "date") return (b.createdAt || "").localeCompare(a.createdAt || "");
    return 0;
  });
  return list;
}

function metric(label, value, iconName = "", kind = "") {
  if (value == null || value === "") return "";
  return `<span class="metric${kind ? ` metric-${esc(kind)}` : ""}">${iconName ? icon(iconName) : ""}<span class="metric-label">${esc(label)}</span> <span class="metric-value">${esc(value)}</span></span>`;
}

function mobileMetric(label, value, iconName = "", kind = "") {
  if (value == null || value === "") return "";
  return `<span class="mobile-metric${kind ? ` mobile-metric-${esc(kind)}` : ""}">${iconName ? icon(iconName) : ""}${esc(label)} <strong>${esc(value)}</strong></span>`;
}

function render() {
  const list = filtered();
  $("meta").textContent = t("results")(list.length);
  $("active-filter").textContent = activeFilterSummary();
  const ul = $("list");
  if (!list.length) {
    ul.innerHTML = `<li class="list-group-item empty">${t("noResults")}</li>`;
    return;
  }
  const frag = document.createDocumentFragment();
  list.forEach(tool => {
    const li = document.createElement("li");
    li.className = "list-group-item tool-item px-0 py-4";
    const desc = tool.desc[lang] || tool.desc.en;
    const starsHtml = starHtml(tool);
    const mobileStarsHtml = starHtml(tool, "mobile-star");
    const stateTags = [];
    if (tool.isNew) stateTags.push(`<span class="state-badge state-badge-new">${t("new")}</span>`);
    if (tool.archived) stateTags.push(`<span class="state-badge state-badge-archived">${t("archived")}</span>`);
    const trendshiftHtml = trendshiftAchievementsHtml(tool);
    const topicTags = Array.isArray(tool.topics) ? tool.topics.slice(0, 3) : [];
    const submetaParts = [
      esc(catTitle(tool.category)),
      ...(tool.language ? [esc(tool.language)] : []),
      ...topicTags.map(topic => esc(topic)),
    ];
    const submeta = submetaParts
      .map(part => `<span>${part}</span>`)
      .join('<span class="submeta-separator"> / </span>');
    const metrics = [
      metric(t("rank"), tool.rank != null ? `#${tool.rank}` : "", "award-fill", "rank"),
      metric(t("forks"), tool.forks != null ? fmtStars(tool.forks) : "", "git", "forks"),
      metric(t("growth"), tool.starsPerWeek != null ? `+${tool.starsPerWeek}/w` : ""),
      metric(t("year"), tool.createdAt ? tool.createdAt.slice(0, 4) : ""),
    ].join("");
    const mobileMetrics = [
      mobileStarsHtml,
      mobileMetric(t("rank"), tool.rank != null ? `#${tool.rank}` : "", "award-fill", "rank"),
      mobileMetric(t("forks"), tool.forks != null ? fmtStars(tool.forks) : "", "git", "forks"),
      mobileMetric(t("year"), tool.createdAt ? tool.createdAt.slice(0, 4) : ""),
    ].join("");

    li.innerHTML = `
      <div class="tool-record">
        <div class="tool-body min-w-0">
          <div class="tool-heading d-flex align-items-center flex-wrap gap-2 mb-2">
            <a class="tool-name text-decoration-none" href="${tool.url}" target="_blank" rel="noopener">${esc(tool.name)}</a>
            ${stateTags.join("")}
            ${trendshiftHtml}
          </div>
          <p class="tool-desc mb-2">${esc(desc)}</p>
          <div class="tool-submeta mb-0">${submeta}</div>
          <div class="mobile-metrics">${mobileMetrics}</div>
        </div>
        <div class="metric-panel">${starsHtml}<div class="metric-list">${metrics}</div></div>
      </div>`;
    frag.appendChild(li);
  });
  ul.innerHTML = "";
  ul.appendChild(frag);
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => (
    {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

let debounce;
$("search").addEventListener("input", e => {
  clearTimeout(debounce);
  debounce = setTimeout(() => { query = e.target.value; render(); }, 120);
});
$("sort").addEventListener("change", e => { sortMode = e.target.value; render(); });
$("f-language").addEventListener("change", e => { activeLang = e.target.value; render(); });
$("f-year").addEventListener("change", e => { activeYear = e.target.value; render(); });
$("f-new").addEventListener("click", e => {
  const pressed = e.currentTarget.getAttribute("aria-pressed") === "true";
  e.currentTarget.setAttribute("aria-pressed", pressed ? "false" : "true");
  render();
});
$("f-trendshift").addEventListener("click", e => {
  const pressed = e.currentTarget.getAttribute("aria-pressed") === "true";
  activeTrendshift = !pressed;
  e.currentTarget.setAttribute("aria-pressed", activeTrendshift ? "true" : "false");
  render();
});
$("category-select").addEventListener("change", e => {
  activeCat = e.target.value;
  applyI18n();
});
document.querySelectorAll(".language-option").forEach(option => {
  option.addEventListener("click", () => {
    lang = option.dataset.lang;
    localStorage.setItem("lang", lang);
    applyI18n();
  });
});

applyI18n();
</script>
<script
  id="bootstrap-js"
  defer
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
  crossorigin="anonymous"
  onload="document.documentElement.dataset.bootstrapJs='ready';"
  onerror="this.onerror=null;this.dataset.bootstrapCdnFailed='true';var s=document.createElement('script');s.src='vendor/bootstrap/5.3.8/js/bootstrap.bundle.min.js';s.dataset.bootstrapFallback='true';s.onload=function(){document.documentElement.dataset.bootstrapJs=window.bootstrap?'ready':'missing';};s.onerror=s.onload;document.body.appendChild(s);"
></script>
<script>
  (() => {
    const localBootstrapSrc = "vendor/bootstrap/5.3.8/js/bootstrap.bundle.min.js";
    const markBootstrapState = () => {
      document.documentElement.dataset.bootstrapJs = window.bootstrap ? "ready" : "missing";
    };
    const loadLocalBootstrap = () => {
      if (window.bootstrap || document.querySelector('script[data-bootstrap-fallback="true"]')) return;
      const fallback = document.createElement("script");
      fallback.src = localBootstrapSrc;
      fallback.dataset.bootstrapFallback = "true";
      fallback.onload = markBootstrapState;
      fallback.onerror = markBootstrapState;
      document.body.appendChild(fallback);
    };
    if (window.bootstrap) {
      markBootstrapState();
    } else {
      setTimeout(() => {
        if (!window.bootstrap) loadLocalBootstrap();
      }, 1200);
      window.addEventListener("load", () => setTimeout(markBootstrapState, 0), { once: true });
    }
  })();
</script>
</body>
</html>
